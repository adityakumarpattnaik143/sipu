name: Daily Progress Report
on:
  schedule:
    # Runs at 08:00 AM UTC every day
    - cron: '0 8 * * *'
jobs:
  email_report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest matplotlib fpdf2
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Generate Report
        run: python generate_report.py

      - name: Send mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{secrets.MAIL_USERNAME}}
          password: ${{secrets.MAIL_PASSWORD}}
          subject: Daily Python Learning Progress Report
          to: adityakumarpattnaik143@gmail.com, pattnaikashirbad4@gmail.com
          from: GitHub Actions Bot <adityakumarpattnaik143@gmail.com>
          html_body: file://email_body.html
          attachments: Ashirbad_Pattnaik_Report.pdf
