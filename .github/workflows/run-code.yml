name: Run Python Code and Tests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run Python Tests
        run: |
          pytest
      - name: Send mail on success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{secrets.MAIL_USERNAME}}
          password: ${{secrets.MAIL_PASSWORD}}
          subject: Run Python Code and Tests - Success
          to: adityakumarpattnaik143@gmail.com, pattnaikashirbad4@gmail.com
          from: GitHub Actions Bot <adityakumarpattnaik143@gmail.com>
          body: "The automated tests passed successfully! The latest code has been verified."
      - name: Send mail on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{secrets.MAIL_USERNAME}}
          password: ${{secrets.MAIL_PASSWORD}}
          subject: Run Python Code and Tests - Failed
          to: adityakumarpattnaik143@gmail.com, pattnaikashirbad4@gmail.com
          from: GitHub Actions Bot <adityakumarpattnaik143@gmail.com>
          body: "The automated tests failed. Please check the GitHub Actions logs to fix the issues."
